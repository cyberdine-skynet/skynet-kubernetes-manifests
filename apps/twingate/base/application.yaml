apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twingate-operator
  namespace: argocd
spec:
  project: skynet-project
  source:
    repoURL: https://twingate.github.io/helm-charts
    chart: twingate-operator
    targetRevision: 0.1.16 # Use the latest version from ArtifactHub
    helm:
      values: |
        # Add custom Helm values here if needed
  destination:
    server: https://kubernetes.default.svc
    namespace: twingate
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
