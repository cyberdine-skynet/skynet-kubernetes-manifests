apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twingate-operator
  namespace: argocd
spec:
  project: skynet-project
  source:
    repoURL: "oci://ghcr.io/twingate/helmcharts"
    chart: twingate-operator
    targetRevision: "0.22.3" # latest published release  [oai_citation:0‡helm.sh](https://helm.sh/docs/topics/registries/?utm_source=chatgpt.com)
    helm:
      valueFiles:
      - values.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: twingate
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
