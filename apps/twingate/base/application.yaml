apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twingate-operator
  namespace: argocd
spec:
  project: skynet-project
  source:
    repoURL: "oci://ghcr.io/twingate/helmcharts/twingate-operator"
    chart: twingate-operator
    targetRevision: "0.22.3" # latest stable Operator version
    helm:
      valueFiles:
      - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: twingate
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
