apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twingate-operator
  namespace: argocd
spec:
  project: skynet-project
  source:
    repoURL: ghcr.io
    chart: helmcharts/twingate-operator
    targetRevision: "0.22.3"
  destination:
    server: https://kubernetes.default.svc
    namespace: twingate
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
