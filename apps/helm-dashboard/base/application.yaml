apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-dashboard
  namespace: argocd
spec:
  project: skynet-project
  source:
    repoURL: https://helm-charts.komodor.io
    chart: helm-dashboard
    targetRevision: 1.4.4
    helm:
      values: |
        service:
          type: NodePort
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  resources:
  - application.yaml
