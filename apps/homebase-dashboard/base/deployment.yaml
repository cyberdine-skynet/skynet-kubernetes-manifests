apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage-dashboard
  template:
    metadata:
      labels:
        app: homepage-dashboard
    spec:
      containers:
      - name: homepage-dashboard
        image: nginx:alpine
        ports:
        - containerPort: 80
