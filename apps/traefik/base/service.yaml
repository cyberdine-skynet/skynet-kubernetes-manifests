apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik
  annotations:
    argocd.argoproj.io/tracking-id: traefik:/Service:traefik
    service.beta.kubernetes.io/metal-lb: "true"
    metallb.universe.tf/address-pool: public-pool
spec:
  selector:
    app: traefik
  ports:
  - name: web
    port: 80
    targetPort: 80
    protocol: TCP
  - name: websecure
    port: 443
    targetPort: 443
    protocol: TCP
  - name: dashboard
    dashboard:
      enabled: true
      ingress:
        enabled: true
        path: /dashboard/
        pathType: Prefix
        annotations:
          kubernetes.io/ingress.class: traefik
        hosts:
        - host: "traefik.fle.api64.de" #traefik.example.com  # Change to your desired host
          paths:
          - /
