apiVersion: v1
kind: Service
metadata:
  name: traefik
spec:
  selector:
    app: traefik
  ports:
  - name: web
    protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30081
  - name: websecure
    protocol: TCP
    port: 443
    targetPort: 443
    nodePort: 30444
    type: NodePort
  - name: dashboard
    port: 8080
    targetPort: 8080
