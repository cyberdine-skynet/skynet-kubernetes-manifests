apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
  - web
  - websecure
  routes:
routes:
- match: PathPrefix(`/dashboard`)
  kind: Rule
  middlewares:
  - name: dashboard-auth
  services:
  - name: traefik
    port: 8080
- match: PathPrefix(`/api`)
  kind: Rule
  middlewares:
  - name: dashboard-auth
  services:
  - name: traefik
    port: 8080
