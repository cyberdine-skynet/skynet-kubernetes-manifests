apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:2.9.3
        args:
        - -config.file=/etc/loki/loki-config.yaml
        volumeMounts:
        - name: loki-pvc
          mountPath: /loki
        # ...other container settings...
        ports:
        - containerPort: 3100
        env: []
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: loki-pvc
        persistentVolumeClaim:
          claimName: loki-pvc
