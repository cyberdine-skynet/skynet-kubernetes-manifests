apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: gitea
  namespace: gitea
spec:
  entryPoints:
  - web
  - websecure
  routes:
  - match: Host(`gitea.fle.api54.de`) && PathPrefix(`/`)
    kind: Rule
    services:
    - name: gitea-http
      port: 3000
  tls:
    certResolver: default
