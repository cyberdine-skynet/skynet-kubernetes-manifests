apiVersion: apps/v1
kind: Deployment
metadata:
  name: metallb
  namespace: metallb-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metallb
  template:
    metadata:
      labels:
        app: metallb
    spec:
      containers:
      - name: metallb
        image: metallb/metallb:v0.11.0
        ports:
        - containerPort: 7472
        - containerPort: 7946
        - containerPort: 80
        args:
        - --config=/etc/metallb/config
        volumeMounts:
        - name: config
          mountPath: /etc/metallb
      volumes:
      - name: config
        configMap:
          name: metallb-config
      serviceAccountName: metallb-controller