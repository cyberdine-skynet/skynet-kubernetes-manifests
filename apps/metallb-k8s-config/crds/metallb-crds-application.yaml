apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/cyberdine-skynet/skynet-kubernetes-manifests'
    targetRevision: HEAD
    path: apps/metallb-k8s-config/crds
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: metallb-system
  syncPolicy:
    automated: {}