---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argo
spec:
  syncPolicy:
    automated: {}
  destination:
    namespace: argo
    server: https://kubernetes.default.svc
  project: default
  sources:
  - chart: argocd-image-updater
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: "0.12.1"
    helm:
      releaseName: argocd-image-updater
      values: |
        extraEnv:
        - name: AWS_REGION
          value: "eu-central-1"
        serviceaccount:
          create: true
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::550573419865:role/argocd-image-updater
        authScripts:
          enabled: true
          scripts: 
            ecr-login.sh: |
              #!/bin/sh
              aws ecr --region $AWS_REGION get-authorization-token --registry-ids 873768864937 --output text --query 'authorizationData[].authorizationToken' | base64 -d
        config:
          registries:
          - name: ECR
            api_url: https://873768864937.dkr.ecr.eu-central-1.amazonaws.com
            prefix: 873768864937.dkr.ecr.eu-central-1.amazonaws.com
            default: true
            ping: yes
            insecure: no
            credentials: ext:/scripts/ecr-login.sh 
            credsexpire: 11h
        podLabels:
          team: "team-platform"
          env: dev

