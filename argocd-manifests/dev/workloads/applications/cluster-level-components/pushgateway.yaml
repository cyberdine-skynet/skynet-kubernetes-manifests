apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pushgateway
  namespace: argocd
  labels:
    app.kubernetes.io/name: pushgateway
    app.kubernetes.io/part-of: cluster-level-components
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: prometheus
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
  project: default
  sources:
  - repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: "3.3.0"
    chart: prometheus-pushgateway
    helm:
      valueFiles:
      - $values/helm-values/pushgateway/prometheus-pushgateway-values-dev.yaml
  - ref: values
    repoURL: https://github.com/Francescoeman/skynet-kubernetes-manifests.git
