apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-ingress
  namespace: argocd
spec:
  syncPolicy:
    automated: {}
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: app-manifests/argocd-ingress/dev
    repoURL: https://github.com/Francescoeman/skynet-kubernetes-manifests.git
    targetRevision: HEAD
    directory:
      include: 'workloads.yaml'
