apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argo
spec:
  syncPolicy:
    automated: {}
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: default
  sources:
  - chart: "metrics-server"
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    targetRevision: "3.12.2"
    helm:
      releaseName: metrics-server
      valueFiles:
      - $values/helm-values/metrics-server/workloads-dev.yaml
  - repoURL: https://github.com/Francescoeman/skynet-kubernetes-manifests.git
    ref: values
