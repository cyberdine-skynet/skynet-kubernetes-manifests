apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skynet-docusaurus-wiki
  namespace: argocd
spec:
  project: dev
  source:
    repoURL: https://github.com/cyberdine-skynet/skynet-docusaurus-wiki.git
    targetRevision: HEAD
    path: k8s-manifests/dev/docusaurus-wiki
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
