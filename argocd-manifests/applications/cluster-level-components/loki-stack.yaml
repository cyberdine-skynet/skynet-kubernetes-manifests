apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cyberdine-skynet/skynet-kubernetes-manifests.git
    targetRevision: main
    chart: loki-stack
    helm:
      valueFiles:
      - helm-values/loki-stack/loki-stack.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: {}