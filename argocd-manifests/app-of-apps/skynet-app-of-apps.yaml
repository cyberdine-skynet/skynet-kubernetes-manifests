apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: skynet-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/cyberdine-skynet/skynet-kubernetes-manifests.git'
    targetRevision: main
    path: argocd-manifests/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
