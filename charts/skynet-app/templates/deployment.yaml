apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skynet-app.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "skynet-app.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "skynet-app.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "skynet-app.name" . }}
    spec:
      nodeSelector: {{ toYaml .Values.nodeSelector | indent 6 }}
      tolerations: {{ toYaml .Values.tolerations | indent 6 }}
      containers:
        - name: skynet
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
            