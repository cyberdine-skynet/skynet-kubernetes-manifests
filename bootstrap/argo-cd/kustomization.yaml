apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
- github.com/argoproj-labs/argocd-autopilot/manifests/base?ref=v0.4.19

configMapGenerator:
- name: argocd-cm
  behavior: merge
  literals:
  - kustomize.buildOptions=--enable-alpha-plugins --enable-helm
  files:
  - oidc.config=oidc.config
  # Optional: add your repository.credentials block as a literal or file
  # - |
  #   repository.credentials=- passwordSecret:
  #       key: git_token
  #       name: autopilot-secret
  #     url: https://github.com/
  #     usernameSecret:
  #       key: git_username
  #       name: autopilot-secret

  # Place your OIDC config in a file named 'oidc.config' in the same directory:
  # oidc.config:
  # name: GitHub
  # issuer: https://github.com
  # clientID: $oidc.github.clientID
  # clientSecret: $oidc.github.clientSecret
  # requestedScopes: ["openid", "profile", "email", "read:org"]
